<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title>Anu Catering Service round logo</title>
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#116f4f"/>
      <stop offset="100%" stop-color="#0b4f3a"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f6a4b" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="112" fill="#f9f6ec"/>
    <circle cx="128" cy="128" r="106" fill="url(#bg)" stroke="#d4af37" stroke-width="6"/>
    <circle cx="128" cy="128" r="94" fill="none" stroke="#f5e3a2" stroke-opacity="0.28" stroke-width="2"/>
  </g>
  <g fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="128" y="145" font-size="66" letter-spacing="3">A2Z</text>
  </g>
</svg>
